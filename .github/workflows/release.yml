name: release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    name: Build and publish the PHAR

    steps:
      - name: Resolve the tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Checkout the code
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.tag }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: dom, curl, libxml, mbstring, zip
          tools: composer:v2
          coverage: none

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Build the PHAR
        run: php wethod app:build wethod --build-version=${{ steps.tag.outputs.version }} --no-interaction

      - name: Upload the PHAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: wethod
          path: builds/wethod

      - name: Upload the PHAR to the release
        run: gh release upload "${{ steps.tag.outputs.tag }}" builds/wethod --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
