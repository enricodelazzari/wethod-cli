name: release

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. v0.1.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    name: Build and publish binaries

    steps:
      - name: Extract the tag version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_ENV
          else
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
          fi

      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ env.VERSION }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: dom, curl, libxml, mbstring, zip
          ini-values: error_reporting=E_ALL, phar.readonly=Off
          tools: composer:v2
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Build PHAR
        run: |
          php wethod app:build wethod --build-version=${{ env.VERSION }} --no-interaction
          mv builds/wethod builds/wethod.phar

      - name: Build binaries for all platforms
        run: ./vendor/bin/phpacker build --src=./builds/wethod.phar --php=8.4 all

      - name: Rename binaries with version
        run: |
          cd builds/build
          mv mac/mac-arm wethod-${{ env.VERSION }}-darwin-arm64
          mv mac/mac-x64 wethod-${{ env.VERSION }}-darwin-x64
          mv linux/linux-arm wethod-${{ env.VERSION }}-linux-arm64
          mv linux/linux-x64 wethod-${{ env.VERSION }}-linux-x64
          mv windows/windows-x64.exe wethod-${{ env.VERSION }}-windows-x64.exe

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: |
            builds/build/wethod-*

      - name: Upload binaries to release
        run: |
          cd builds/build
          gh release upload ${{ env.VERSION }} \
            wethod-${{ env.VERSION }}-darwin-arm64 \
            wethod-${{ env.VERSION }}-darwin-x64 \
            wethod-${{ env.VERSION }}-linux-arm64 \
            wethod-${{ env.VERSION }}-linux-x64 \
            wethod-${{ env.VERSION }}-windows-x64.exe
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
