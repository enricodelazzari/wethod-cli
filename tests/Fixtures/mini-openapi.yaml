openapi: 3.0.0
info:
  title: Mini Wethod
  version: '2024-06-15'
servers:
  - url: https://api.wethod.com
paths:
  /api/clients:
    get:
      tags: [Client]
      summary: List clients
      operationId: listClients
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
        - name: Wethod-Company
          in: header
          required: true
          schema:
            type: string
        - name: Wethod-Version
          in: header
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Returns the list of clients.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
